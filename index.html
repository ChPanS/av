<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>av · livecoding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0b0d;
      --panel: #101216;
      --panel-2: #15181d;
      --line: #23272e;
      --text: #e7e9ec;
      --dim: #7b828c;
      --accent: #c6ff2e;       /* кислотный лайм — единственный яркий акцент */
      --err: #ff5d5d;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      /* лёгкая зернистость поверх фона */
      background-image:
        radial-gradient(circle at 20% 10%, rgba(198,255,46,0.04), transparent 40%),
        radial-gradient(circle at 90% 90%, rgba(80,140,255,0.05), transparent 45%);
    }

    header {
      display: flex; align-items: baseline; gap: 14px;
      padding: 12px 18px; border-bottom: 1px solid var(--line);
    }
    header .mark {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 20px; letter-spacing: -0.02em; color: var(--text);
    }
    header .mark b { color: var(--accent); }
    header .sub { color: var(--dim); font-size: 11px; }

    main { flex: 1; display: flex; min-height: 0; }

    /* левая колонка — редакторы */
    .left { width: 46%; min-width: 340px; display: flex; flex-direction: column; border-right: 1px solid var(--line); }
    .tabs { display: flex; gap: 2px; padding: 10px 12px 0; }
    .tab {
      font: inherit; font-size: 12px; color: var(--dim);
      background: transparent; border: 1px solid var(--line); border-bottom: none;
      padding: 7px 14px; cursor: pointer; border-radius: 6px 6px 0 0;
      letter-spacing: 0.04em;
    }
    .tab.active { color: var(--bg); background: var(--accent); border-color: var(--accent); font-weight: 700; }
    .editors { flex: 1; position: relative; border-top: 1px solid var(--line); min-height: 0; }
    .pane { position: absolute; inset: 0; }
    .pane.hidden { display: none; }

    /* правая колонка — рендер */
    .right { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    #stage { flex: 1; position: relative; background: #000; }
    #gl { width: 100%; height: 100%; display: block; }

    /* панель управления */
    .controls { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-top: 1px solid var(--line); background: var(--panel); }
    button.ctl {
      font: inherit; font-size: 12px; letter-spacing: 0.03em;
      background: var(--panel-2); color: var(--text);
      border: 1px solid var(--line); padding: 8px 14px; border-radius: 7px; cursor: pointer;
      transition: border-color .15s, color .15s, transform .05s;
    }
    button.ctl:hover { border-color: var(--accent); }
    button.ctl:active { transform: translateY(1px); }
    button.ctl:disabled { opacity: .5; cursor: default; }
    #play { color: var(--accent); border-color: var(--accent); font-weight: 700; min-width: 84px; }
    #debug.on { color: var(--bg); background: var(--accent); border-color: var(--accent); font-weight: 700; }
    .spacer { flex: 1; }
    #status { color: var(--dim); font-size: 11px; padding-right: 4px; max-width: 50%; text-align: right; }
    #status.err { color: var(--err); }

    /* панель лога / дебага */
    .logpanel { height: 190px; display: flex; flex-direction: column; border-top: 1px solid var(--line); background: #07080a; }
    .logpanel.hidden { display: none; }
    .loghead { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim); padding: 6px 12px; border-bottom: 1px solid var(--line); }
    .log { flex: 1; overflow-y: auto; padding: 6px 12px; font-size: 11.5px; line-height: 1.5; }
    .logline { white-space: pre-wrap; word-break: break-word; }
    .logline.info  { color: var(--dim); }
    .logline.cmd   { color: #9fb4c8; }
    .logline.ok    { color: var(--accent); }
    .logline.event { color: #6f7b86; }
    .logline.err   { color: var(--err); }

    @media (max-width: 820px) {
      body { overflow-y: auto; }
      header { padding: 10px 14px; }
      header .mark { font-size: 17px; }
      header .sub { display: none; }              /* экономим место на узком экране */

      main { flex-direction: column; }

      /* 1) поле ввода кода — сверху */
      .left { width: 100%; min-width: 0; border-right: none; border-bottom: 1px solid var(--line); }
      .editors { height: 38vh; }
      .logpanel { height: 26vh; }

      /* 2) «плеер» (рендер) — по центру */
      .right { width: 100%; }
      #stage { height: 42vh; min-height: 240px; }

      /* 3) кнопки — снизу, крупные, по 2 в ряд */
      .controls { flex-wrap: wrap; gap: 8px; padding: 10px; }
      .controls .spacer { display: none; }
      button.ctl { flex: 1 1 auto; min-width: calc(50% - 6px); padding: 12px 10px; font-size: 13px; text-align: center; }
      #play { min-width: calc(50% - 6px); }
      #status { width: 100%; max-width: none; text-align: left; order: 99; padding: 6px 2px 0; }
    }
  </style>
</head>
<body>
  <header>
    <span class="mark">av<b>·</b>livecoding</span>
    <span class="sub">strudel + webgl · pattern → sound &amp; pixels</span>
  </header>

  <main>
    <section class="left">
      <div class="tabs">
        <button class="tab" id="tab-pattern">pattern.js</button>
        <button class="tab" id="tab-shader">shader.frag</button>
      </div>
      <div class="editors">
        <div class="pane" id="pane-pattern"></div>
        <div class="pane" id="pane-shader"></div>
      </div>
      <div class="logpanel hidden" id="logpanel">
        <div class="loghead">console</div>
        <div class="log" id="log"></div>
      </div>
    </section>

    <section class="right">
      <div id="stage">
        <canvas id="gl"></canvas>
      </div>
      <div class="controls">
        <button class="ctl" id="play">▶ play / update</button>
        <button class="ctl" id="stop">■ stop</button>
        <button class="ctl" id="share">● share (video)</button>
        <button class="ctl" id="fullscreen">⤢ fullscreen</button>
        <button class="ctl" id="copylink">⎘ link</button>
        <button class="ctl" id="debug">⚙ debug</button>
        <span class="spacer"></span>
        <span id="status">нажми play (Ctrl+Enter)</span>
      </div>
    </section>
  </main>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
